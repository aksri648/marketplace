name = "abes-marketplace-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "abes-marketplace"
# Run `npx wrangler d1 create abes-marketplace` to create the DB and get the database_id
database_id = "YOUR_DATABASE_ID"

[vars]
# Non-secret runtime variables only.
# JWT_SECRET and RESEND_API_KEY must be set as encrypted secrets:
#   npx wrangler secret put JWT_SECRET
#   npx wrangler secret put RESEND_API_KEY
FRONTEND_URL = "https://abes-marketplace.pages.dev"
